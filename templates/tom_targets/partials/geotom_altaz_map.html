<div class="d-flex justify-content-end align-items-center mb-2">
  <div class="btn-group btn-group-sm" role="group" aria-label="Map mode">
    <button id="map-mode-hadec" type="button" class="btn btn-outline-primary">HA-Dec</button>
    <button id="map-mode-altaz" type="button" class="btn btn-primary">Alt-Az</button>
  </div>
</div>
<div class="geotom-map-wrap">
  <div id="geotom-altaz-map"></div>
  <div id="geotom-map-popup" class="geotom-map-popup" hidden>
    <div id="geotom-map-popup-content"></div>
  </div>
</div>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<script>
  (function() {
    var targets = JSON.parse('{{ geotom_targets_json|escapejs }}');
    var visibilityCurveHADEC = JSON.parse('{{ geotom_visibility_curve_hadec_json|escapejs }}');
    var visibilityCurveALTAZ = JSON.parse('{{ geotom_visibility_curve_altaz_json|escapejs }}');
    var sunHADEC = JSON.parse('{{ geotom_sun_hadec_json|escapejs }}');
    var sunALTAZ = JSON.parse('{{ geotom_sun_altaz_json|escapejs }}');
    var mapElement = document.getElementById('geotom-altaz-map');
    var popupElement = document.getElementById('geotom-map-popup');
    var popupContentElement = document.getElementById('geotom-map-popup-content');
    var selectedTargetId = null;
    var renderedTargets = [];
    var suppressNextMapClickClear = false;

    function formatEstimatedMagnitude(value) {
      return value === null || value === undefined ? '-' : value.toFixed(2);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function applyTableFilter(targetId) {
      if (!window.geotomTable || !$.fn.dataTable || !$.fn.dataTable.ext) {
        window.geotomSelectedTargetId = targetId || null;
        return;
      }

      if (!window.geotomTableSelectionFilter) {
        window.geotomTableSelectionFilter = function(settings, data, dataIndex) {
          if (!window.geotomSelectedTargetId) {
            return true;
          }
          if (!settings.nTable || settings.nTable.id !== 'geotom-table') {
            return true;
          }
          var row = settings.aoData[dataIndex] && settings.aoData[dataIndex].nTr;
          return !!row && row.getAttribute('data-target-id') === String(window.geotomSelectedTargetId);
        };
        $.fn.dataTable.ext.search.push(window.geotomTableSelectionFilter);
      }

      window.geotomSelectedTargetId = targetId || null;
      window.geotomTable.draw();
    }

    function getFilteredTargetId() {
      return window.geotomSelectedTargetId || null;
    }

    function hidePopup() {
      popupElement.hidden = true;
      popupContentElement.innerHTML = '';
    }

    function clearSelection() {
      selectedTargetId = null;
      applyTableFilter(null);
      renderMode(mapElement.dataset.mode || 'altaz');
      hidePopup();
    }

    function getTargetById(targetId) {
      for (var i = 0; i < targets.length; i++) {
        if (Number(targets[i].target_id) === Number(targetId)) {
          return targets[i];
        }
      }
      return null;
    }

    function getVisibleTargets() {
      var filteredTargetId = getFilteredTargetId();
      if (filteredTargetId === null) {
        return targets;
      }

      var target = getTargetById(filteredTargetId);
      return target ? [target] : [];
    }

    function setSelectedTarget(targetId, showPopup) {
      var numericTargetId = targetId === null || targetId === undefined ? null : Number(targetId);
      var target = numericTargetId === null ? null : getTargetById(numericTargetId);
      if (numericTargetId !== null && !target) {
        clearSelection();
        return;
      }

      selectedTargetId = numericTargetId;
      applyTableFilter(numericTargetId);
      renderMode(mapElement.dataset.mode || 'altaz');

      if (target && showPopup) {
        showPopup(target, mapElement.dataset.mode || 'altaz');
      } else {
        hidePopup();
      }
    }

    function toggleSelectedTarget(targetId) {
      var numericTargetId = Number(targetId);
      if (selectedTargetId === numericTargetId) {
        clearSelection();
        return;
      }
      setSelectedTarget(numericTargetId, true);
    }

    function showPopup(target, mode) {
      var xLabel = mode === 'hadec'
        ? 'HA: ' + target.hour_angle_hours.toFixed(3) + ' h'
        : 'Az: ' + target.az_deg.toFixed(2) + '&deg;';
      var yLabel = mode === 'hadec'
        ? 'Dec: ' + target.dec_deg.toFixed(3) + '&deg;'
        : 'Alt: ' + target.alt_deg.toFixed(2) + '&deg;';
      var linkLabel = getFilteredTargetId() === target.target_id ? 'Show all again' : 'Show only this target below';

      popupContentElement.innerHTML =
        '<div class="geotom-map-popup-title">' + escapeHtml(target.target_name) + '</div>' +
        '<div class="small text-muted mb-1">NORAD: ' + escapeHtml(target.norad_id) + '</div>' +
        '<div>' + xLabel + '</div>' +
        '<div>' + yLabel + '</div>' +
        '<div>V (est.): ' + formatEstimatedMagnitude(target.estimated_vmag) + '</div>' +
        '<div class="mb-2">Range: ' + target.distance_km.toFixed(0) + ' km</div>' +
        '<a href="#" class="geotom-map-popup-link" data-target-id="' + escapeHtml(target.target_id) + '">' + linkLabel + '</a>';
      popupElement.hidden = false;
    }

    function buildModePayload(mode) {
      var visibleTargets = getVisibleTargets();
      var x = [];
      var y = [];
      var text = [];
      var markerColors = [];
      var markerOpacity = [];
      var curveX = [];
      var curveY = [];
      var curve = mode === 'hadec' ? visibilityCurveHADEC : visibilityCurveALTAZ;
      var sun = mode === 'hadec' ? sunHADEC : sunALTAZ;

      renderedTargets = visibleTargets;

      for (var i = 0; i < visibleTargets.length; i++) {
        var t = visibleTargets[i];
        if (mode === 'hadec') {
          x.push(t.hour_angle_hours);
          y.push(t.dec_deg);
          text.push(
            '<b>' + t.target_name + '</b><br>' +
            'NORAD: ' + t.norad_id + '<br>' +
            'TLE: ' + t.tle_name + '<br>' +
            'HA: ' + t.hour_angle_hours.toFixed(3) + ' h<br>' +
            'Dec: ' + t.dec_deg.toFixed(3) + '&deg;<br>' +
            'V (est.): ' + formatEstimatedMagnitude(t.estimated_vmag) + '<br>' +
            'Range: ' + t.distance_km.toFixed(0) + ' km'
          );
          markerColors.push(t.is_debris ? '#ff8a3d' : '#2b9ecb');
        } else {
          x.push(t.az_deg);
          y.push(t.alt_deg);
          text.push(
            '<b>' + t.target_name + '</b><br>' +
            'NORAD: ' + t.norad_id + '<br>' +
            'TLE: ' + t.tle_name + '<br>' +
            'Az: ' + t.az_deg.toFixed(2) + '&deg;<br>' +
            'Alt: ' + t.alt_deg.toFixed(2) + '&deg;<br>' +
            'V (est.): ' + formatEstimatedMagnitude(t.estimated_vmag) + '<br>' +
            'Range: ' + t.distance_km.toFixed(0) + ' km'
          );
          markerColors.push(t.is_debris ? '#ff8a3d' : '#2b9ecb');
        }

        var belowHorizon = t.alt_deg < 0;
        var inDaylightZone = t.solar_elongation_deg < 90;
        if (belowHorizon && inDaylightZone) {
          markerOpacity.push(0.12);
        } else if (belowHorizon || inDaylightZone) {
          markerOpacity.push(0.22);
        } else {
          markerOpacity.push(0.95);
        }
      }

      for (var j = 0; j < curve.length; j++) {
        curveX.push(mode === 'hadec' ? curve[j].ha_hours : curve[j].az_deg);
        curveY.push(curve[j].dec_deg !== undefined ? curve[j].dec_deg : curve[j].alt_deg);
      }

      var satTrace = {
        type: 'scatter',
        mode: 'markers',
        x: x,
        y: y,
        text: text,
        hovertemplate: '%{text}<extra></extra>',
        marker: {
          size: 11,
          color: markerColors,
          opacity: markerOpacity,
          line: { color: '#111', width: 0.5 }
        }
      };

      var visibilityTrace = {
        type: 'scatter',
        mode: 'lines',
        x: curveX,
        y: curveY,
        line: {
          color: '#ff8c00',
          width: 2,
          dash: 'dash'
        },
        hovertemplate: mode === 'hadec'
          ? 'Visibility line<br>HA: %{x:.3f} h<br>Dec: %{y:.2f}&deg;<extra></extra>'
          : 'Visibility line<br>Az: %{x:.2f}&deg;<br>Alt: %{y:.2f}&deg;<extra></extra>'
      };

      var sunTrace = {
        type: 'scatter',
        mode: 'markers',
        x: [mode === 'hadec' ? sun.ha_hours : sun.az_deg],
        y: [mode === 'hadec' ? sun.dec_deg : sun.alt_deg],
        marker: {
          size: 18,
          color: '#ffd400',
          line: { color: '#8a6a00', width: 1.2 }
        },
        hovertemplate: mode === 'hadec'
          ? '<b>Sun</b><br>HA: %{x:.3f} h<br>Dec: %{y:.2f}&deg;<extra></extra>'
          : '<b>Sun</b><br>Az: %{x:.2f}&deg;<br>Alt: %{y:.2f}&deg;<extra></extra>'
      };

      var layout = {
        margin: { l: 54, r: 24, t: 12, b: 48 },
        showlegend: false,
        paper_bgcolor: '#ffffff',
        plot_bgcolor: '#ffffff',
        xaxis: mode === 'hadec'
          ? { title: 'Hour Angle [h]', range: [0, 24], dtick: 2, zeroline: false, gridcolor: '#e7e7e7' }
          : { title: 'Azimuth [deg]', range: [0, 360], dtick: 45, zeroline: false, gridcolor: '#e7e7e7' },
        yaxis: mode === 'hadec'
          ? { title: 'Declination [deg]', range: [-90, 90], dtick: 10, zeroline: false, gridcolor: '#efefef' }
          : { title: 'Altitude [deg]', range: [-20, 90], dtick: 10, zeroline: true, zerolinewidth: 2, zerolinecolor: '#4a4a4a', gridcolor: '#efefef' },
        shapes: mode === 'hadec'
          ? []
          : [{
              type: 'line',
              x0: 0,
              x1: 360,
              y0: 0,
              y1: 0,
              line: { color: '#444', width: 2 }
            }]
      };

      return { traces: [visibilityTrace, satTrace, sunTrace], layout: layout };
    }

    function setButtons(mode) {
      var hadecBtn = document.getElementById('map-mode-hadec');
      var altazBtn = document.getElementById('map-mode-altaz');
      if (mode === 'hadec') {
        hadecBtn.className = 'btn btn-primary';
        altazBtn.className = 'btn btn-outline-primary';
      } else {
        hadecBtn.className = 'btn btn-outline-primary';
        altazBtn.className = 'btn btn-primary';
      }
    }

    function renderMode(mode) {
      var payload = buildModePayload(mode);
      Plotly.react('geotom-altaz-map', payload.traces, payload.layout, {
        responsive: true,
        displaylogo: false,
        modeBarButtonsToRemove: ['lasso2d', 'select2d']
      });
      mapElement.dataset.mode = mode;
      setButtons(mode);

      if (selectedTargetId !== null) {
        var selectedTarget = getTargetById(selectedTargetId);
        if (selectedTarget) {
          showPopup(selectedTarget, mode);
        }
      }
    }

    Plotly.newPlot('geotom-altaz-map', [], {}, {
      responsive: true,
      displaylogo: false,
      modeBarButtonsToRemove: ['lasso2d', 'select2d']
    });

    renderMode('altaz');
    document.getElementById('map-mode-hadec').addEventListener('click', function() { renderMode('hadec'); });
    document.getElementById('map-mode-altaz').addEventListener('click', function() { renderMode('altaz'); });

    mapElement.on('plotly_click', function(eventData) {
      if (!eventData || !eventData.points || !eventData.points.length) {
        return;
      }

      var point = eventData.points[0];
      if (point.curveNumber !== 1) {
        return;
      }
      var target = renderedTargets[point.pointIndex];
      if (!target) {
        return;
      }

      suppressNextMapClickClear = true;
      toggleSelectedTarget(target.target_id);
    });

    mapElement.addEventListener('click', function(event) {
      if (event.target.closest('.geotom-map-popup-link')) {
        return;
      }

      if (suppressNextMapClickClear) {
        suppressNextMapClickClear = false;
        return;
      }

      if (selectedTargetId !== null) {
        clearSelection();
      }
    });

    popupElement.addEventListener('click', function(event) {
      var filterLink = event.target.closest('.geotom-map-popup-link');
      if (!filterLink) {
        return;
      }

      event.preventDefault();
      toggleSelectedTarget(filterLink.getAttribute('data-target-id'));
    });

    window.geotomToggleTargetSelection = toggleSelectedTarget;
    window.geotomClearTargetSelection = clearSelection;
  })();
</script>
