{% if render_chart %}
<link rel="stylesheet" href="//aladin.u-strasbg.fr/AladinLite/api/v2/latest/aladin.min.css" />
<h3>Survey View</h3>
<div id="aladin-lite-div-nonsidereal-{{ target.id }}" style="width:300px;height:300px;"></div>
<div id="chart-form-div-nonsidereal-{{ target.id }}" style="width:300px;">
  <form id="chart-form-nonsidereal-{{ target.id }}">
    <div class="form-group mt-1 mb-1">
      <div class="input-group">
        <div class="input-group-prepend">
          <span class="input-group-text bg-transparent" style="font-family: inherit;">Field of view</span>
        </div>
        <input type="number" class="form-control" aria-label="Field of view" id="fov-nonsidereal-{{ target.id }}" min="0" value="10">
        <div class="input-group-append">
          <select id="fov-units-select-nonsidereal-{{ target.id }}" class="form-control">
            <option>arcsec</option>
            <option selected>arcmin</option>
            <option>deg</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group mt-1 mb-1">
      <div class="input-group">
        <div class="input-group-prepend">
          <label class="input-group-text bg-transparent" style="font-family: inherit;" for="scale-bar-units-select-nonsidereal-{{ target.id }}">Scale bar</label>
        </div>
        <input type="number" class="form-control" aria-label="Scale bar size" id="scale-bar-size-nonsidereal-{{ target.id }}" min="0" value="1">
        <div class="input-group-append">
          <select id="scale-bar-units-select-nonsidereal-{{ target.id }}" class="form-control">
            <option>arcsec</option>
            <option selected>arcmin</option>
            <option>deg</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group mt-1 mb-1">
      <input class="btn btn-primary" type="button" onclick="updateFromFormNonSidereal{{ target.id }}({{ chart_ra }}, {{ chart_dec }})" value="Update">
      <a class="btn btn-primary" id="download-chart-nonsidereal-{{ target.id }}" href="" download="chart.png" onclick="downloadImageNonSidereal{{ target.id }}()">Save Image</a>
    </div>
  </form>
</div>
<script type="text/javascript" src="//aladin.u-strasbg.fr/AladinLite/api/v2/latest/aladin.min.js" charset="utf-8"></script>
<script type="text/javascript">
  (function() {
    const targetId = '{{ target.id }}';
    const chartRa = {{ chart_ra }};
    const chartDec = {{ chart_dec }};

    function byId(prefix) {
      return document.getElementById(prefix + targetId);
    }

    function toDegrees(value, units) {
      if (units === 'arcmin') {
        return value / 60;
      } else if (units === 'arcsec') {
        return value / 3600;
      }
      return value;
    }

    function getScaleBarFromForm() {
      let size = Number(byId('scale-bar-size-nonsidereal-').value);
      if (size < 0) {
        size = 0;
      }
      const units = byId('scale-bar-units-select-nonsidereal-').value;
      return {
        size: size,
        units: units,
        label: String(size) + ' ' + units,
        sizeAsDegrees: toDegrees(size, units),
      };
    }

    function getFovAsDegreesFromForm() {
      const fov = Number(byId('fov-nonsidereal-').value);
      const units = byId('fov-units-select-nonsidereal-').value;
      if (fov >= 0) {
        return toDegrees(fov, units);
      }
      return undefined;
    }

    const aladin = A.aladin('#aladin-lite-div-nonsidereal-' + targetId, {
      survey: 'P/DSS2/color',
      fov: getFovAsDegreesFromForm(),
      showReticle: false,
      target: chartRa + ' ' + chartDec,
      showGotoControl: false,
      showZoomControl: false
    });

    function annotateChart(targetRa, targetDec) {
      const fovDegrees = aladin.getFov()[0];
      const scaleBar = getScaleBarFromForm();
      const viewSizePix = aladin.getSize();
      const offsetPixFromEdge = 30;
      const scaleBarStartPix = [offsetPixFromEdge, viewSizePix[1] - offsetPixFromEdge];
      const compassCenterPix = [viewSizePix[0] - offsetPixFromEdge, viewSizePix[1] - offsetPixFromEdge];
      const cosDec = Math.cos(targetDec * Math.PI / 180);
      const compassArmLength = fovDegrees / 10;
      const compassCenter = aladin.pix2world(compassCenterPix[0], compassCenterPix[1]);
      const compassNorthArm = [compassCenter[0], compassCenter[1] + compassArmLength];
      const compassNorthArmPix = aladin.world2pix(compassNorthArm[0], compassNorthArm[1]);
      const compassEastArm = [compassCenter[0] + compassArmLength / cosDec, compassCenter[1]];
      const compassEastArmPix = aladin.world2pix(compassEastArm[0], compassEastArm[1]);
      const scaleBarStart = aladin.pix2world(scaleBarStartPix[0], scaleBarStartPix[1]);
      const scaleBarEnd = [scaleBarStart[0] - scaleBar.sizeAsDegrees / cosDec, scaleBarStart[1]];
      const scaleBarEndPix = aladin.world2pix(scaleBarEnd[0], scaleBarEnd[1]);
      const scaleBarLength = Math.abs(scaleBarEndPix[0] - scaleBarStartPix[0]);
      const color = '#f72525';
      const scaleBarTextSpacing = 7;
      const compassTextSpacing = 3;
      aladin.removeLayers();
      let layer = A.graphicOverlay({name: 'chart annotations', color: color, lineWidth: 2});
      aladin.addOverlay(layer);
      layer.add(A.polyline([compassNorthArm, compassCenter, compassEastArm]));
      layer.add(A.polyline([scaleBarStart, scaleBarEnd]));
      layer.add(A.circle(targetRa, targetDec, fovDegrees / 30));
      layer.add(new Text(scaleBarStartPix[0] + scaleBarLength / 2, scaleBarStartPix[1] - scaleBarTextSpacing, scaleBar.label, {color: color}));
      layer.add(new Text(compassNorthArmPix[0], compassNorthArmPix[1] - compassTextSpacing, 'N', {color: color}));
      layer.add(new Text(compassEastArmPix[0] - compassTextSpacing, compassEastArmPix[1], 'E', {color: color, align: 'end', baseline: 'middle'}));
    }

    aladin.on('positionChanged', function() {
      annotateChart(chartRa, chartDec);
    });

    aladin.on('zoomChanged', function() {
      annotateChart(chartRa, chartDec);
    });

    window['downloadImageNonSidereal' + targetId] = function() {
      byId('download-chart-nonsidereal-').href = aladin.getViewDataURL();
      return true;
    };

    window['updateFromFormNonSidereal' + targetId] = function(ra, dec) {
      const fov = getFovAsDegreesFromForm();
      if (fov !== undefined) {
        aladin.setFov(fov);
        annotateChart(ra, dec);
      }
    };

    const Text = (function() {
      function Text(x, y, text, options) {
        options = options || {};
        this.x = x || undefined;
        this.y = y || undefined;
        this.text = text || '';
        this.color = options.color || undefined;
        this.align = options.align || 'center';
        this.baseline = options.baseline || 'alphabetic';
        this.overlay = null;
      }

      Text.prototype.setOverlay = function(overlay) {
        this.overlay = overlay;
      };

      Text.prototype.draw = function(ctx) {
        ctx.fillStyle = this.color;
        ctx.font = '15px Arial';
        ctx.textAlign = this.align;
        ctx.textBaseline = this.baseline;
        ctx.fillText(this.text, this.x, this.y);
      };

      return Text;
    })();
  })();
</script>
{% endif %}
